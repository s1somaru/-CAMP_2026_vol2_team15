<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ログイン画面</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="mobile-app-container login-screen">
    <div class="login-container">
        <h2>ログイン</h2>
        <div class="input-group">
            <label>メールアドレス</label>
            <input type="email" id="emailInput" placeholder="example@mail.com">
        </div>
        <div class="input-group">
            <label>パスワード</label>
            <input type="password" id="passwordInput" placeholder="パスワードを入力">
        </div>
        <button id="loginButton" class="btn">ログインする</button>
        <p id="message"></p>
    </div>
</div>
</body>
    <script src="main.js"></script>
</body>
</html>
